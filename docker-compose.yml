services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      # 將 SQLite DB 目錄掛載到 Docker Volume，容器重啟後資料不會消失
      - db-data:/app/db
    environment:
      - NODE_ENV=production
      # 如需串接綠界正式環境，在此填入真實金鑰（或用 .env 檔）
      # - ECPAY_MERCHANT_ID=your_id
      # - ECPAY_HASH_KEY=your_key
      # - ECPAY_HASH_IV=your_iv
    restart: unless-stopped

volumes:
  db-data:
